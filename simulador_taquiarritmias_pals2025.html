<html lang="es">
<head>
<meta charset="UTF-8">
<title>Taquiarritmias Pediátricas — PALS 2025</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 1.5rem; max-width: 820px; margin: 0 auto; font-size: 14px; }
h1 { font-size: 16px; font-weight: 500; }
.subtitle { font-size: 11px; color: #6b7280; margin-top: 2px; margin-bottom: 1.2rem; }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.bi { background: #dbeafe; color: #1e40af; }
.bd { background: #fee2e2; color: #991b1b; }
.bw { background: #fef3c7; color: #92400e; }
.bs { background: #d1fae5; color: #065f46; }
.bg { background: #f3f4f6; color: #374151; }

/* Progress */
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; }
.prog-bar { flex: 1; height: 4px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: #3b82f6; border-radius: 99px; transition: width .4s; }
.prog-label { font-size: 11px; color: #6b7280; white-space: nowrap; }
.score-pill { font-size: 11px; padding: 2px 10px; border-radius: 99px; background: #f3f4f6; color: #374151; }

/* Case card */
.case-card { border: 0.5px solid #e5e7eb; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.case-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.case-avatar { width: 36px; height: 36px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.case-name { font-size: 14px; font-weight: 500; }
.case-meta { font-size: 11px; color: #6b7280; }
.case-text { font-size: 13px; line-height: 1.65; color: #374151; }
.vitals-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.vchip { background: #f9fafb; border: 0.5px solid #e5e7eb; border-radius: 6px; padding: 5px 10px; font-size: 12px; }
.vchip span { font-weight: 500; }
.vchip.danger span { color: #dc2626; }
.vchip.warn span { color: #d97706; }
.vchip.ok span { color: #059669; }

/* ECG Monitor */
.monitor { background: #060606; border-radius: 10px; padding: 10px 14px 10px; margin-bottom: 1rem; }
.monitor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.monitor-title { font-size: 10px; color: #00ff41; font-family: monospace; letter-spacing: .05em; }
.monitor-info { font-size: 10px; color: #6b7280; font-family: monospace; }
canvas { display: block; width: 100%; }
.ecg-scale { display: flex; justify-content: space-between; margin-top: 4px; }
.ecg-scale span { font-size: 9px; color: #374151; font-family: monospace; }

/* ECG annotations */
.ecg-annotation { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.ann-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b7280; }
.ann-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Steps */
.step-tabs { display: flex; gap: 0; margin-bottom: 1rem; border: 0.5px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
.step-tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 12px; color: #6b7280; background: #f9fafb; border-right: 0.5px solid #e5e7eb; cursor: default; }
.step-tab:last-child { border-right: none; }
.step-tab.active { background: #fff; color: #1a1a1a; font-weight: 500; }
.step-tab.done { background: #d1fae5; color: #065f46; }

/* Question */
.q-label { font-size: 13px; font-weight: 500; color: #111827; margin-bottom: 8px; }
.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1rem; }
.opt-btn { background: #fff; border: 0.5px solid #d1d5db; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 13px; text-align: left; color: #1a1a1a; display: flex; align-items: flex-start; gap: 8px; line-height: 1.45; transition: background .1s; }
.opt-btn:hover:not(:disabled) { background: #f9fafb; }
.opt-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.opt-btn.correct { border-color: #6ee7b7; background: #d1fae5; color: #065f46; }
.opt-btn.incorrect { border-color: #fca5a5; background: #fee2e2; color: #991b1b; }
.opt-letter { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 4px; background: #f3f4f6; color: #6b7280; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
.opt-btn.correct .opt-letter { background: #6ee7b7; color: #065f46; }
.opt-btn.incorrect .opt-letter { background: #fca5a5; color: #991b1b; }

/* Feedback */
.fb { border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.6; margin-bottom: 1rem; border: 0.5px solid; }
.fb-ok { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
.fb-err { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
.fb-info { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
.key-points { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid rgba(0,0,0,.08); }
.key-points li { margin-left: 16px; margin-bottom: 3px; font-size: 12px; }

/* Treatment box */
.tx-box { background: #f8fafc; border: 0.5px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; margin-bottom: 1rem; }
.tx-title { font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
.tx-step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.tx-num { width: 20px; height: 20px; border-radius: 50%; background: #3b82f6; color: #fff; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.tx-content { font-size: 13px; line-height: 1.5; flex: 1; }
.tx-dose { font-weight: 500; color: #1e40af; }
.tx-note { font-size: 11px; color: #6b7280; margin-top: 2px; }

/* Nav */
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
.btn { padding: 8px 18px; border-radius: 8px; border: 0.5px solid #d1d5db; background: #fff; color: #1a1a1a; font-size: 13px; cursor: pointer; }
.btn:hover { background: #f9fafb; }
.btn-primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.btn-primary:hover { background: #1e40af; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Score final */
.final { text-align: center; padding: 2rem 0; }
.final-score { font-size: 52px; font-weight: 500; margin-bottom: 6px; }
.final-msg { font-size: 14px; color: #6b7280; margin-bottom: 1.5rem; }
.final-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; text-align: left; }
.final-card { background: #f9fafb; border-radius: 8px; padding: 10px 12px; }
.final-card-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.final-card-val { font-size: 18px; font-weight: 500; }

/* Rhythm legend */
.rhythm-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 8px; border-radius: 99px; margin-right: 4px; }
</style>
</head>

let caseIdx = 0;
let step = 1; // 1 = diagnosis, 2 = treatment
let scores = { correct: 0, total: 0 };
let stepDone = { 1: false, 2: false };
let ecgAnimId = null;
let ecgPhase = 0;

function fmt2(n) { return n < 10 ? '0'+n : ''+n; }

function updateProgress() {
  const total = CASES.length * 2;
  const done = caseIdx * 2 + (step - 1) + (stepDone[step] ? 1 : 0);
  document.getElementById('prog').style.width = Math.round(done/total*100) + '%';
  document.getElementById('prog-label').textContent = `Caso ${caseIdx+1} de ${CASES.length}`;
  document.getElementById('score-pill').textContent = `Puntos: ${scores.correct}/${scores.total}`;
}

function drawECG(c) {
  if (ecgAnimId) cancelAnimationFrame(ecgAnimId);
  const canvas = document.getElementById('ecg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cfg = c.ecgConfig;

  function frame() {
    const W = canvas.offsetWidth || 740;
    canvas.width = W;
    const H = 90;
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = cfg.gridColor;
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ecgPhase = (ecgPhase + 2.2) % W;
    const type = cfg.type;
    const hr = cfg.hr || 200;

    for (let x = 0; x < W; x++) {
      const t = ((x + ecgPhase) % W) / W;
      let y = H / 2;

      if (type === 'svt') {
        const cycleLen = 60 / hr;
        const beatT = (t * (W / 60 / cycleLen * 0.5)) % 1;
        if (beatT < 0.03) y = H/2 - 3;
        else if (beatT < 0.055) y = H/2 - 22;
        else if (beatT < 0.08) y = H/2 + 8;
        else if (beatT < 0.11) y = H/2 - 2;
        else y = H/2;
      } else if (type === 'sinus_tach') {
        const beats = hr / 60 * 2.5;
        const beatT = (t * beats) % 1;
        if (beatT < 0.06) y = H/2 - 5;
        else if (beatT < 0.10) y = H/2 - 2;
        else if (beatT < 0.14) y = H/2 - 20;
        else if (beatT < 0.18) y = H/2 + 7;
        else if (beatT < 0.22) y = H/2 - 2;
        else if (beatT > 0.3 && beatT < 0.45) y = H/2 - 5 * Math.sin((beatT-0.3)*Math.PI/0.15);
        else y = H/2;
      } else if (type === 'vt') {
        const beats = hr / 60 * 2.5;
        const beatT = (t * beats) % 1;
        if (beatT < 0.18) y = H/2 + 18 * Math.sin(beatT * Math.PI / 0.18);
        else if (beatT < 0.36) y = H/2 - 16 * Math.sin((beatT-0.18) * Math.PI / 0.18);
        else y = H/2 + (Math.random() * 1.5 - 0.75);
        // independent P
        const pT = (t * 2.1) % 1;
        if (pT < 0.08) y += -4 * Math.sin(pT * Math.PI / 0.08) * 0.5;
      } else if (type === 'vfib') {
        const noise = Math.sin(t * Math.PI * 31) * 20 + Math.sin(t * Math.PI * 17) * 12 + Math.sin(t * Math.PI * 7) * 8;
        y = H/2 + noise * (0.5 + Math.random() * 0.5);
      } else if (type === 'junctional') {
        const beats = 220 / 60 * 2.5;
        const beatT = (t * beats) % 1;
        if (beatT < 0.03) y = H/2 - 2;
        else if (beatT < 0.055) y = H/2 - 20;
        else if (beatT < 0.08) y = H/2 + 7;
        else if (beatT < 0.11) y = H/2 - 2;
        else y = H/2;
        // AV dissociation: P at different rate (slower, ~160 bpm)
        const aRate = 160 / 60 * 2.5;
        const aT = (t * aRate + 0.4) % 1;
        if (aT < 0.06) y += -4 * Math.sin(aT * Math.PI / 0.06);
      }
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ecgAnimId = requestAnimationFrame(frame);
  }
  frame();
}

  stepDone = { 1: false, 2: false };
  step = 1;
  updateProgress();

function renderStep() {
  const c = CASES[caseIdx];
  const data = step === 1 ? c.step1 : c.step2;
  const letters = ['A','B','C','D'];

  // Update tabs
  document.getElementById('tab1').className = 'step-tab' + (step===1?' active':'') + (stepDone[1]?' done':'');
  document.getElementById('tab2').className = 'step-tab' + (step===2?' active':'') + (stepDone[2]?' done':'');

  document.getElementById('step-content').innerHTML = `
    <div class="q-label">${data.q}</div>
    <div class="options" id="opts">
      ${data.opts.map((o,i) => `
        <button class="opt-btn" id="opt${i}" onclick="handleOpt(${i})">
          <span class="opt-letter">${letters[i]}</span>
          ${o.t}
        </button>`).join('')}
    </div>
    <div id="fb-area"></div>
    ${step===2 && stepDone[2] ? renderTx(data.treatment) : ''}
  `;
  renderNav();
  updateProgress();
}

function renderTx(tx) {
  if (!tx) return '';
  return `
    <div class="tx-box">
      <div class="tx-title">${tx.title}</div>
      ${tx.steps.map(s => `
        <div class="tx-step">
          <div class="tx-num">${s.n}</div>
          <div class="tx-content">
            <div>${s.text} — <span class="tx-dose">${s.dose}</span></div>
            <div class="tx-note">${s.note}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function handleOpt(idx) {
  if (stepDone[step]) return;
  stepDone[step] = true;
  scores.total++;

  const c = CASES[caseIdx];
  const data = step === 1 ? c.step1 : c.step2;
  const chosen = data.opts[idx];
  if (chosen.ok) scores.correct++;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (data.opts[i].ok) b.classList.add('correct');
  });
  btns[idx].classList.add(chosen.ok ? 'correct' : 'incorrect');

  const fbArea = document.getElementById('fb-area');
  fbArea.innerHTML = `
    <div class="fb ${chosen.ok ? 'fb-ok' : 'fb-err'}">
      <strong>${chosen.ok ? 'Correcto' : 'No es la mejor opción'}:</strong> ${chosen.fb}
    </div>
    ${step===2 ? renderTx(data.treatment) : ''}
  `;

  // Update tab done state
  document.getElementById('tab'+step).className = 'step-tab done' + (step===1?' active':'');
  renderNav();
  updateProgress();
}

function renderNav() {
  const nav = document.getElementById('nav-row');
  if (!nav) return;
  const c = CASES[caseIdx];
  const isLastCase = caseIdx === CASES.length - 1;

  let html = '<div style="display:flex;gap:8px;width:100%">';

  if (step === 1 && stepDone[1]) {
    html += `<button class="btn btn-primary" style="flex:1" onclick="goStep2()">Continuar → Tratamiento</button>`;
  } else if (step === 2 && stepDone[2]) {
    if (!isLastCase) {
      html += `<button class="btn btn-primary" style="flex:1" onclick="nextCase()">Siguiente caso →</button>`;
    } else {
      html += `<button class="btn btn-primary" style="flex:1" onclick="showFinal()">Ver resultado final →</button>`;
    }
  }

  html += '</div>';
  nav.innerHTML = html;
}

function goStep2() {
  step = 2;
  renderStep();
  // scroll to step tabs
  document.getElementById('step-tabs').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function nextCase() {
  caseIdx++;
  renderCase();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFinal() {
  if (ecgAnimId) cancelAnimationFrame(ecgAnimId);
  const pct = Math.round(scores.correct / scores.total * 100);
  const cls = pct >= 80 ? 'ok' : pct >= 60 ? 'warn' : 'danger';
  const colors = { ok: '#059669', warn: '#d97706', danger: '#dc2626' };
  const msgs = {
    ok: 'Excelente dominio del reconocimiento y manejo de taquiarritmias pediátricas.',
    warn: 'Buen intento. Repasa los casos donde cometiste errores.',
    danger: 'Necesitas repasar el algoritmo PALS 2025 de taquiarritmias.'
  };

  document.getElementById('main').innerHTML = `
    <div class="final">
      <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">Resultado final — Taquiarritmias Pediátricas</div>
      <div class="final-score" style="color:${colors[cls]}">${scores.correct}/${scores.total}</div>
      <div class="final-msg">${pct}% · ${msgs[cls]}</div>

      <div class="final-grid">
        <div class="final-card">
          <div class="final-card-label">Diagnósticos correctos</div>
          <div class="final-card-val" style="color:#1d4ed8">${scores.correct} / ${scores.total}</div>
        </div>
        <div class="final-card">
          <div class="final-card-label">Precisión</div>
          <div class="final-card-val" style="color:${colors[cls]}">${pct}%</div>
        </div>
        <div class="final-card">
          <div class="final-card-label">Casos completados</div>
          <div class="final-card-val">${CASES.length} / ${CASES.length}</div>
        </div>
      </div>

      <div style="background:#f9fafb;border-radius:10px;padding:1rem 1.25rem;text-align:left;margin-bottom:1.5rem;">
        <div style="font-size:12px;font-weight:500;color:#6b7280;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Arritmias evaluadas</div>
        <div style="display:flex;flex-direction:column;gap:6px;font-size:13px;">
          <div>✓ TSV paroxística — lactante estable → maniobras vagales</div>
          <div>✓ Taquicardia sinusal — diferenciación con TSV</div>
          <div>✓ Taquicardia ventricular con pulso → cardioversión sincronizada</div>
          <div>✓ TSV inestable → cardioversión sincronizada inmediata</div>
          <div>✓ Fibrilación ventricular → desfibrilación no sincronizada</div>
          <div>✓ JET post-quirúrgica → amiodarona + hipotermia leve (NO cardioversión)</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn" onclick="restart()">Reiniciar módulo</button>
        <button class="btn btn-primary" onclick="window.open('simulador_pals_2025.html','_blank')">Ir al simulador PCR ↗</button>
      </div>
    </div>
  `;
  updateProgress();
}

function restart() {
  caseIdx = 0;
  scores = { correct: 0, total: 0 };
  renderCase();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderCase();
</script>
</body>
</html>
